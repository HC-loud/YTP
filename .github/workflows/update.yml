name: Auto Update AltStore JSON

on:
  schedule:
    - cron: '0 0 * * *' # 매일 자정(UTC 기준)에 자동 실행
  workflow_dispatch: # 수동 실행 버튼

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 내 저장소 파일 가져오기
        uses: actions/checkout@v4

      - name: Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 업데이트 스크립트 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}  # GitHub 레포 Secrets에 등록 필요
        run: python update.py

      - name: 변경된 내용이 있으면 깃허브에 저장(Commit)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update: 최신 앱 버전으로 갱신됨"
